<div class="release-card" (click)="openLink()">
  <img [src]="currentRelease.cover" alt="Album Cover" class="cover-art">

  <div class="info">
    <span class="badge">🔥 {{ currentRelease.type }}</span>
    <h3>{{ currentRelease.title }}</h3>
    <span class="date">Drops: {{ currentRelease.date }}</span>

    <button class="pre-save-btn">
      <i class="fab fa-spotify"></i> Pre-Save Now
    </button>
  </div>
</div>
