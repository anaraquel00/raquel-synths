<!-- 🛡️ ESCUDO 1: Protege o Cabeçalho dinâmico -->
<app-header ngSkipHydration></app-header>

<main id="main-content" role="main">
  <router-outlet></router-outlet>
</main>

<section class="ads-section">
  @defer (on viewport) {
    <app-ad-banner ngSkipHydration></app-ad-banner>
  } @placeholder {
    <div style="min-height: 100px; width: 100%;"></div>
  }
</section>

<!-- 🛡️ ESCUDO 2: Protege o Rodapé dinâmico -->
<app-footer ngSkipHydration></app-footer>

<!-- Se não é navegador (SSR), não renderiza nada. O erro de hidratação deixa de existir. -->
@if (isBrowser()) {
  @defer (on timer(1s)) {
    @if (!cookiesAccepted()) {
      <div class="cookie-banner fade-in-up">
        <div class="cookie-content">
          <span class="cookie-icon">🍪</span>
          <p>
            {{ translate.isPt() ? 'Utilizamos cookies do Google...' : 'We use Google and Stripe...' }}
          </p>
        </div>
        <button (click)="acceptCookies()" class="btn-accept">
           {{ translate.isPt() ? 'ACEITAR DADOS' : 'ACCEPT DATA' }}
        </button>
      </div>
    }
  }
}
