<div class="home-container">

  <div class="hero-section">

    <div class="title-wrapper">
      <h1 class="hero-title" [attr.data-text]="navText.title">{{ navText.title }}</h1>

      <app-last-releases class="widget-position"></app-last-releases>
    </div>

    <p class="hero-subtitle">{{ navText.subtitle }}</p>

    <div class="music-player-container">
  <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/4F1DgcouNGtOJolXu5zQNX?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
</div>
    <button mat-stroked-button class="hero-cta" (click)="scrollTo('contato')">
      {{ contactText.heroButton }}
    </button>
  </div>
</div>
