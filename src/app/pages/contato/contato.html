<div class="uplink-section">
  <h2>{{ text.title }}</h2>
  <p>{{ text.subtitle }}</p>

  @if (successMessage) {
    <div class="success-box">
      {{ text.success }}
    </div>
  }

  @if (!successMessage) {
    <form [formGroup]="uplinkForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>{{ text.form.name }}</label>
        <input type="text" formControlName="agentName" [placeholder]="text.form.namePlaceholder">
        @if (uplinkForm.get('agentName')?.invalid && uplinkForm.get('agentName')?.touched) {
          <small class="error">
            {{ text.errors.required }}
          </small>
        }
      </div>
      <div class="form-group">
        <label>{{ text.form.email }}</label>
        <input type="email" formControlName="email" [placeholder]="text.form.emailPlaceholder">
      </div>
      <div class="form-group">
        <label>{{ text.form.daw }}</label>
        <select formControlName="daw">
          <option value="Ableton">Ableton Live</option>
          <option value="FL Studio">FL Studio</option>
          <option value="Logic Pro">Logic Pro</option>
          <option value="Reaper">Reaper</option>
          <option value="Other">Outra/Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>{{ text.form.link }}</label>
        <input type="text" formControlName="demoLink" placeholder="SoundCloud / Spotify URL">
      </div>
      <div class="form-group">
        <label>{{ text.form.message }}</label>
        <textarea formControlName="message" rows="4"></textarea>
      </div>
      <button type="submit" [disabled]="uplinkForm.invalid || isSending">
        {{ isSending ? text.form.sending : text.form.submit }}
      </button>
    </form>
  }
</div>
