<section class="bios-container">
  <h2 class="section-title">QUEM SOMOS</h2>
  <div class="manifesto-text">

    <p [innerHTML]="translate.isPt()
      ? 'A <strong>RaQuel Synths (RQS)</strong> é um projeto de <em>Narrativa Transmedia</em> e <em>Engenharia Musical</em>. Utilizamos Inteligência Artificial (Suno, OpenAI) e frameworks modernos (Angular 20+) para explorar a colisão entre o caos humano e a precisão algorítmica.'
      : '<strong>RaQuel Synths (RQS)</strong> is a <em>Transmedia Narrative</em> and <em>Musical Engineering</em> project. We use Artificial Intelligence (Suno, OpenAI) and modern frameworks (Angular 20+) to explore the collision between human chaos and algorithmic precision.'">
    </p>

  </div>

  <div class="members-grid">
    @for (member of members; track member) {
      <div class="member-card">
        <div class="image-frame">
          <img [src]="member.imageBroklin" class="img-broklin" alt="Foto Normal">
          <img [src]="member.imageJonah" class="img-jonah" alt="Foto Glitch">
        </div>
        <div class="info-box">
          <h3>{{ member.name }}</h3>
          <span class="role">{{ member.role }}</span>
          <p class="bio-text normal-text">{{ member.bioNormal }}</p>
          <p class="bio-text jonah-text">{{ member.bioJonah }}</p>
        </div>
      </div>
    }
  </div>
</section>
