<section class="bios-container">
  <h2 class="section-title">{{ translate.isPt() ? 'QUEM SOMOS' : 'WHO WE ARE' }}</h2>
  <div class="manifesto-text">
    <p [innerHTML]="translate.isPt() ? manifestoPt : manifestoEn"(click)="handleClick($event)">
    </p>
  </div>
  <div class="manifesto_jonah">
  <p [innerHTML]="translate.isPt() ? manifesto_jonah_pt : manifesto_jonah_en" (click)="handleClick($event)"></p>
  </div>

  <div class="members-grid">
    @for (member of members; track member.name; let i = $index) {
      <div class="member-card">
<div class="image-frame">
  <img [ngSrc]="member.imageBroklin" 
       fill
       sizes="(max-width: 768px) 100vw, 15vw"
       [priority]="i === 0" 
       class="img-broklin" 
       alt="Foto Normal">
  
  <img [ngSrc]="member.imageJonah" 
       fill
       sizes="(max-width: 768px) 100vw, 15vw"
       class="img-jonah" 
       alt="Foto Glitch">
</div>
        <div class="info-box">
          <h3>{{ member.name }}</h3>
          <span class="role">{{ member.role }}</span>
          <p class="bio-text normal-text">{{ member.bioNormal }}</p>
          <p class="bio-text jonah-text">{{ member.bioJonah }}</p>
        </div>
      </div>
    }
  </div>
</section>
