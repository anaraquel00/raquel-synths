<div class="compliance-page" [ngClass]="currentModeClass">
  <h1>{{ data.title }}</h1>

  <article>
    <h2>{{ data.privacyTitle }}</h2>
    <p>{{ data.privacyText }}</p>
  </article>

  <article>
    <h2>{{ data.deletionTitle }}</h2>
    <p>{{ data.deletionText }}</p>
  </article>

  <article>
    <h2>{{ data.categoryTitle }}</h2>
    <p>{{ data.categoryText }}</p>
  </article>

   <article>
    <h2>{{ data.policyTitle }}</h2>
    <p [innerHTML]="data.policyText"></p>
  </article>
</div>
