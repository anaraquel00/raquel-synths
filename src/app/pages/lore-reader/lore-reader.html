<div class="lore-container">

  <!-- BOTÃO DE VOLTAR -->
  <button class="back-btn" (click)="goBack()">
    &larr; {{ translate.isPt() ? 'VOLTAR À BASE' : 'BACK TO BASE' }}
  </button>

  <!-- CABEÇALHO DA PÁGINA -->
  <header class="saga-header">
    <h1>{{ translate.isPt() ? 'ARQUIVOS RQS' : 'RQS ARCHIVES' }}</h1>
    <p class="subtitle">VISUAL NOVEL: ARCO BROKLIN</p>
  </header>

  <!-- LISTA DE EPISÓDIOS -->
  <!-- O *ngFor aqui vai percorrer a lista 'episodes' que definimos no TS -->
  <div class="episodes-list">

    <article *ngFor="let ep of episodes" class="episode-card">

      <!-- Cabeçalho do Episódio -->
      <div class="ep-header">
        <span class="season-badge">{{ ep.seasonTitle }}</span>
        <span class="date">{{ ep.releaseDate | date:'dd/MM/yyyy' }}</span>
      </div>

      <h2>{{ ep.title }}</h2>

      <!-- IMAGEM DE CAPA (Só aparece se tiver imagem no data) -->
      <div class="episode-cover" *ngIf="ep.coverImage">
        <img [src]="ep.coverImage" alt="Cover do Episódio">
      </div>

      <!-- 👇 O CONTEÚDO DO TEXTO (AQUI ESTÁ A HISTÓRIA) -->
       <div class="story-content">

        <ng-container *ngFor="let block of ep.blocks">

          <!-- SE FOR TEXTO -->
          <div *ngIf="block.type === 'text'" [innerHTML]="block.content"></div>

          <!-- SE FOR ANÚNCIO (AQUI ELE CARREGA DE VERDADE!) -->
          <div *ngIf="block.type === 'ad'" class="ad-spacer">
            <app-ad-banner></app-ad-banner> <!-- Seu componente mágico -->
          </div>

        </ng-container>

      </div>

      <!-- Divisor Estiloso -->
      <div class="divider">
        <span>● ● ●</span>
      </div>

    </article>

    <!-- Mensagem se não houver episódios ou fim da lista -->
    <div class="cliffhanger">
      <p>
        {{ translate.isPt() ? 'Próxima transmissão em breve...' : 'Next transmission incoming...' }}
      </p>
    </div>

  </div>
</div>
