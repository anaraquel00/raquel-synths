 <script>
  let metaRadarAtivado = false;

  function acionarRadarMeta() {
    if (metaRadarAtivado) return; // Se já ligou, ignora
    metaRadarAtivado = true;

    // 1. O Código Oficial da Corporação
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];}(window,document,'script');

    // 2. A Injeção Assíncrona do Arquivo Pesado
    var t=document.createElement('script');
    t.async=!0;
    t.src='https://connect.facebook.net/en_US/fbevents.js';
    var s=document.getElementsByTagName('script')[0];
    s.parentNode.insertBefore(t,s);
    
    // 3. A Inicialização
    fbq('init', '2358502707934592');
    fbq('track', 'PageView');
    console.log("🛡️ [SISTEMA] Radar da Meta ativado por intervenção humana.");

    // 4. Limpeza de Memória (Removemos os ouvintes para poupar CPU)
    ['scroll', 'mousemove', 'touchstart'].forEach(function(evento) {
      window.removeEventListener(evento, acionarRadarMeta);
    });
  }

  // 🎧 A ARMADILHA: Fica escutando qualquer sinal de vida do usuário
  ['scroll', 'mousemove', 'touchstart'].forEach(function(evento) {
    window.addEventListener(evento, acionarRadarMeta, { once: true, passive: true });
  });

  // ⏳ FALLBACK: Se o usuário abrir a página e ficar olhando pro nada por 8 segundos, o radar liga sozinho.
  setTimeout(acionarRadarMeta, 8000);
</script>

<body style="background-color: #04043a69; margin: 0; display: flex; flex-direction: column; min-height: 100vh;">
  
  <!-- 4. SKELETON LOADER - Tática agressiva de Retenção -->
 <app-root>
    <div id="boot-screen" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100vw; background-color: #0a0a12; font-family: 'Montserrat', sans-serif; transition: all 0.3s ease;">
      
      <h2 id="boot-title" style="margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">INIT SYSTEM...</h2>
      <p id="boot-subtitle" style="color: #888; font-family: 'Roboto', sans-serif; font-size: 14px;">Buscando pacotes de dados...</p>

      <style>
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @keyframes glitch { 
          0% { transform: translate(0) } 
          20% { transform: translate(-2px, 2px) } 
          40% { transform: translate(-2px, -2px) } 
          60% { transform: translate(2px, 2px) } 
          80% { transform: translate(2px, -2px) } 
          100% { transform: translate(0) } 
        }

        .tech-mode { color: #00f3ff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); animation: pulse 1.5s infinite; }
        .jonah-mode { color: #ff003c; text-shadow: 0 0 15px rgba(255, 0, 60, 0.8); animation: glitch 0.3s infinite alternate !important; }
      </style>

      <script>
        (function() {
          try {
            var savedTheme = localStorage.getItem('rqs-theme'); 
            
            // 🌍 RADAR DE IDIOMA: Lê a configuração do navegador do usuário
            var userLang = navigator.language || navigator.userLanguage;
            var isPt = userLang.toLowerCase().includes('pt');
            
            var title = document.getElementById('boot-title');
            var subtitle = document.getElementById('boot-subtitle');
            var bootScreen = document.getElementById('boot-screen');

            // Modo Jonah (Caos)
            if (savedTheme === 'jonah') {
              document.body.classList.add('mode-jonah');
              title.innerText = 'SYSTEM OVERRIDE...';
              title.className = 'jonah-mode';
              // Entrega a ameaça no idioma correto
              subtitle.innerText = isPt ? '[ Infiltrando vírus e corrompendo a matriz de áudio ]' : '[ Injecting virus and corrupting the audio matrix ]';
              bootScreen.style.backgroundColor = '#050000'; 
            } 
            // Modo Broklin (Tech Lead)
            else {
              document.body.classList.add('mode-broklin');
              title.innerText = 'STARTING UPLINK...';
              title.className = 'tech-mode';
              // Entrega a blindagem no idioma correto
              subtitle.innerText = isPt ? '[ Carregando blindagem e módulos de áudio Synthwave ]' : '[ Loading armor and Synthwave audio modules ]';
            }
          } catch (e) { 
            console.error('Falha na ignição do bootloader:', e); 
          }
        })();
      </script>
    </div>
  </app-root>
